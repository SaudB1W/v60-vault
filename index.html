<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/v60.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF7F2" />
    <title>The V60 Vault — Pour-over Recipe Journal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

    <script>

        theme: {
          extend: {
            colors: {
              cream: '#FAF7F2',
              oatmeal: '#E8E0D5',
              lightbrown: '#C4A882',
              espresso: '#3D2B1F',

              display: ['"Playfair Display"', 'serif'],
              sans: ['"DM Sans"', 'system-ui', 'sans-serif'],

            borderRadius: {

            boxShadow: {
              card: '0 1px 2px rgba(61, 43, 31, 0.04), 0 8px 24px rgba(61, 43, 31, 0.06)',
              cardHover: '0 4px 8px rgba(61, 43, 31, 0.06), 0 18px 40px rgba(61, 43, 31, 0.12)',
